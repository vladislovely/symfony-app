version: '3.9'

networks:
  default:
    driver: bridge

x-logging-rules: &logging-rules
  logging:
    driver: "json-file"
    options:
      max-size: 20m
      max-file: "5"

volumes:
  php_socket:
  caddy_data:
  caddy_config:
  database:
    driver: local

services:
  ### php-fpm ###
  php:
    container_name: php
    build:
      context: .
      target: app_php
      args:
        SYMFONY_VERSION: ${SYMFONY_VERSION:-6.3}
        STABILITY: ${STABILITY:-stable}
      dockerfile: Dockerfile
    #command: 'sh -c "cd /var/www/app && composer install --no-interaction --prefer-dist --optimize-autoloader && php bin/console doctrine:migrations:migrate && php-fpm"'
    volumes:
      - php_socket:/var/run/php
    healthcheck:
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    env_file:
      - ${APP_CODE_PATH_HOST}/.env
    networks:
      - default
    depends_on:
      database:
        condition: service_healthy
    <<: *logging-rules

  ### Mysql database ###
  database:
    container_name: database
    image: postgres:${POSTGRES_VERSION:-15}
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    volumes:
      - database:/var/lib/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
    <<: *logging-rules

  caddy:
    container_name: caddy
    build:
      context: .
      target: app_caddy
    depends_on:
      - php
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost, caddy:80}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-publisherJWTKey123321}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-subscriberJWTKey132456}
    restart: unless-stopped
    volumes:
      - php_socket:/var/run/php
      - caddy_data:/data
      - caddy_config:/config
    ports:
      # HTTP
      - target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      # HTTPS
      - target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      # HTTP/3
      - target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp
    networks:
      - default
    <<: *logging-rules